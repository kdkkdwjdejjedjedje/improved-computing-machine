<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pirate TV – Canais ao Vivo </title>
<meta name="description" content="Pirate TV é uma das plataformas mais populares para quem deseja assistir canais de TV ao vivo gratuitamente, sem cadastro e em alta qualidade.">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:Arial, sans-serif;
  background:linear-gradient(180deg,#0a0b1e,#05060f);
  color:#fff;
}

/* HEADER */
header{
  background:rgba(15,17,40,.95);
  backdrop-filter:blur(10px);
  border-bottom:1px solid rgba(255,255,255,.05);
}
.header-inner{
  max-width:1200px;
  margin:auto;
  padding:15px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
nav a{
  color:#aaa;
  margin-left:20px;
  text-decoration:none;
  font-weight:600;
}
nav a:hover,.active{color:#00e0ff}

/* CONTAINER */
.container{
  max-width:1200px;
  margin:auto;
  padding:20px;
}

.home-canais-title{
  text-align:center;
  margin-bottom:20px;
}

/* SEARCH */
#search-canais{
  width:100%;
  padding:14px;
  border-radius:10px;
  border:none;
  margin-bottom:20px;
  background:#14162e;
  color:#fff;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:16px;
}

/* CARD */
.channel-card{
  background:#14162e;
  border-radius:12px;
  overflow:hidden;
  transition:.25s;
  cursor:pointer;
  border:1px solid rgba(255,255,255,.05);
}
.channel-card:hover{
  transform:translateY(-6px) scale(1.02);
  background:#1c1f44;
}
.channel-card img{
  width:100%;
  height:100px;
  object-fit:cover;
}
.channel-card h3{
  padding:10px;
  font-size:14px;
  text-align:center;
  color:#ddd;
}

/* SEO BOX */
.seo-content{
  background:#11132b;
  padding:20px;
  border-radius:12px;
  margin-top:30px;
  color:#aaa;
}

/* FOOTER */
footer{
  margin-top:40px;
  background:#0f1128;
}
.footer-inner{
  max-width:1200px;
  margin:auto;
  padding:20px;
  text-align:center;
  color:#888;
}
</style>

</head>

<body>

<header>
  <div class="header-inner">
    <img src="piratetv.png" width="120">
    <nav>
      <a href="/">Início</a>
      <a href="/canais" class="active">Canais</a>
      <a href="/bbb">BBB</a>
    </nav>
  </div>
</header>

<div class="container">

  <h1 class="home-canais-title">Canais ao Vivo</h1>

  <input type="search" id="search-canais" placeholder="Buscar canal...">

  <!-- IMPORTANTE: NÃO MEXER (canais.js usa isso) -->
  <section class="grid" id="canais-grid">
    <p style="text-align:center;padding:40px;color:#777">
      Carregando canais...
    </p>
  </section>

  <!-- SEO -->
  <article class="seo-content">
    <h2>Canais de TV Online Grátis</h2>
    <p>
      Assista canais ao vivo gratuitamente, sem cadastro e em alta qualidade.
    </p>
  </article>

</div>

<footer>
  <div class="footer-inner">
Pirate TV é a sua plataforma para assistir futebol ao vivo e outros esportes online.
  </div>
</footer>

<!-- SEU SISTEMA ORIGINAL -->
<script src="assets/canais.js"></script>

<script>
// BUSCA (mantida)
const searchInput = document.getElementById('search-canais');

searchInput.addEventListener('input', () => {
  const q = searchInput.value.toLowerCase();

  document.querySelectorAll('.channel-card').forEach(card => {
    const nome = card.querySelector('h3')?.textContent.toLowerCase() || '';
    card.style.display = nome.includes(q) ? '' : 'none';
  });
});
</script>

</body>
</html>
